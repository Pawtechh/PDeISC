<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Proyecto 6 – Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
  <div class="container py-5">
    <div class="row g-4">

      <!-- FORMULARIO -->
      <div class="col-md-6">
        <form id="formRegistro" class="panel p-4 rounded">
          <h4 class="mb-4">📋 Formulario de Registro</h4>

          <!-- NOMBRE -->
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" id="fNombre" class="form-control"
                   placeholder="Ej: Ana García"
                   required minlength="3" maxlength="50"/>
          </div>

          <!-- EDAD -->
          <div class="mb-3">
            <label class="form-label">Edad</label>
            <input type="number" id="fEdad" class="form-control"
                   min="1" max="120" required/>
          </div>

          <!-- EMAIL (VALIDADO) -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="fEmail" class="form-control"
                   placeholder="usuario@email.com"
                   required
                   pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$"
                   title="Ingresá un email válido (ej: usuario@gmail.com)"/>
          </div>

          <!-- GENERO -->
          <div class="mb-3">
            <label class="form-label">Género</label><br/>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="genero" value="Masculino" required/>
              <label class="form-check-label">Masculino</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="genero" value="Femenino"/>
              <label class="form-check-label">Femenino</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="genero" value="Otro"/>
              <label class="form-check-label">Otro</label>
            </div>
          </div>

          <!-- PAIS -->
          <div class="mb-3">
            <label class="form-label">País</label>
            <select id="fPais" class="form-select" required>
              <option value="">-- Seleccioná --</option>
              <option>Argentina</option>
              <option>Brasil</option>
              <option>Chile</option>
              <option>Uruguay</option>
              <option>México</option>
            </select>
          </div>

          <!-- INTERESES -->
          <div class="mb-3">
            <label class="form-label">Intereses</label><br/>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" value="Desarrollo Web"/>
              <label class="form-check-label">Desarrollo Web</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" value="Inteligencia Artificial"/>
              <label class="form-check-label">IA</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" value="Datos"/>
              <label class="form-check-label">Datos</label>
            </div>
          </div>

          <!-- BOTON -->
          <button type="submit" class="btn btn-primary w-100">
            ✅ Registrar
          </button>
        </form>
      </div>

      <!-- RESULTADO -->
      <div class="col-md-6">
        <div id="resultado-registro" class="panel p-4 rounded d-none">
          <h4 class="mb-3">🎉 Datos registrados</h4>
          <div id="campos-resultado"></div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="/js/registro.js"></script>
</body>
</html>
